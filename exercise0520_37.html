<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circle Properties Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background-color: #f5f5f5;
        }

    </style>
</head>
<body>

    <div class="container">
        <h2>圓形計算結果</h2>
        <div id="result" class="output"></div>
    </div>

    <script>
        // 1. 計算圓周長的函式
        function calcCircumfrence(radius) {
            // Math.PI 是 JS 內建的圓周率常數
            let circumference = 2 * Math.PI * radius;
            
            // 根據題目要求，組合出輸出的字串
            let resultText = "The circumference is " + circumference.toFixed(2);
            
            // 輸出到 Console (開發者工具)
            console.log(resultText);
            
            return resultText;
        }

        // 2. 計算圓面積的函式
        function calcArea(radius) {
            let area = Math.PI * radius * radius;
            
            let resultText = "The area is " + area.toFixed(2);
            
            console.log(resultText);
            
            return resultText;
        }

        // ==========================================
        // 實際呼叫 (執行) 這兩個函式來測試
        // ==========================================
        
        let testRadius = 5; // 假設半徑為 5
        
        // 取得計算結果
        let circumResult = calcCircumfrence(testRadius);
        let areaResult = calcArea(testRadius);

        // 將結果印在網頁畫面上，方便觀看
        document.getElementById('result').innerHTML = 
            "Radius: " + testRadius + "<br><br>" + 
            circumResult + "<br>" + 
            areaResult;
            
    </script>
</body>
</html>
