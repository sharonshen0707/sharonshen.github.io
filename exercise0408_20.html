
<!DOCTYPE html>
<html>

<head>
<style>
    tr:nth-child(even){background-color: yellow;}
    th{
        background-color: gray;
        color: white;
    }
    table,th,td{
        border: 1px solid black;
        padding: 10px;
    }
    table{
        border-collapse: collapse;
    }

    div.fix{
        position: fixed;
        top: 0px;
        right: 0px;
        border: 3px solid green;
        width: 100px;
        height: 100px;

    }
</style>
</head>

<body>
    <table>
        <tr>
        <th>Firstname</th>
        <th>Lastname</th>
        </tr>
        <tr>
        <td>1</td>
        <td>1</td>
        </tr>
        <tr>
        <td>2</td>
        <td>2</td>
        </tr>
        <tr>
        <td>3</td>
        <td>3</td>
        </tr>
    </table>

    <div class="fix">This div element has position: fixed;</div>
</body>

</html>
