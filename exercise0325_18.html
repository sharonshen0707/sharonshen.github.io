<!DOCTYPE html>
<html>
<head>
    <style>
    h1{
        text-decoration: overline;
        text-shadow: 2px 2px pink;
    }
    h2{
        border: 1px solid black;
        outline: 2px outset yellow;
        font-style: oblique;
    }
    h3{
        text-decoration: underline;
        text-align: right;
    }

    </style>
</head>
<body>
    <h1>This is heading 1</h1>
    <h2>This is heading 2</h2>
    <h3>This is heading 3</h3>
</body>
</html>
