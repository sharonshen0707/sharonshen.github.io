<!DOCTYPE html>
<html>
    
<head>

<style>

.gallery-container {
display: flex; /* 使用 flexbox 讓圖片橫向並排 */
}

.img_left {
border-radius: 18px;
width: 33%;
height: 300px;

object-fit: cover;
}

.img_middle {
border-radius: 50%;
width: 150px;
height: 150px;

border: 1px solid #000000;
padding: 3px
}

.img_right {
height:300px
}


</style>
</head>

<body>
<div class="gallery-container">
<img src="https://www.w3schools.com/css/paris.jpg" alt="left" class="img_left">
<img src="https://www.w3schools.com/css/img_5terre.jpg" alt="middle" class="img_middle">
<img src="https://www.w3schools.com/css/paris.jpg" alt="right" class="img_right">
</div>

</body>

</html>
