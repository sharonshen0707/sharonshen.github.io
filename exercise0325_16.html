<!DOCTYPE html>
<html>
<head>
    <style>
    .first {
        border-style: double;
        border-width: 8px;
        border-color: rgb(232, 110, 82);
        background-color: rgb(140, 201, 221);
    }
    .second{
        border-style: solid;
        border-width: 3px;
        border-color: rgb(127, 176, 202);
        border-radius: 10px;
        background-color: yellow;
    }
    .third{
        border-style: dotted;
        border-width: 8px;
        border-color: gray;
        background-color: green;
    }
    </style>
</head>
<body>
    <h1 class="first">Hello World</h1>
    <h1 class="second">Hello World</h1>
    <h1 class="third">Hello World</h1>
</body>
</html>
